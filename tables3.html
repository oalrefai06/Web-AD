<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables 03</title>

<style>
    /* table { */
        /* width: 900px; */
        /* border-color: #f44336;

    } */
    table,th, td{
  border: 1px dashed rgb(39, 45, 39);
  /* border-collapse: collapse; */
    border-radius: 10px;
    text-align: center;
}

th{
    border-color: chartreuse;
}

th,td{
    padding: 10px;
}

table{
        border-spacing: 15px;

}

tr:nth-child(even) {
  background-color: #D6EEEE;
}

tr:nth-child(even) {
  background-color: #D6EEEE;
}

tr:nth-child(odd) {
  background-color: orangered;
}

td:nth-child(even) {
  background-color: yellow;
}

tr:hover{
    background-color: yellow;
}


</style>

</head>
<body>
   
    
    
    <table dir="rtl">
        <caption>Table Caption</caption>
        <tr>
            <th>A SSSSSSSSSS</th>
            <td>1</td>
            <td>7</td>

        </tr>
        <tr style="height: 300px;">
            <th rowspan="2" style="background-color: burlywood;">B,C</th>
            <td colspan="2">2,8</td>
            <!-- <td>8</td> -->
        </tr>
        <tr>
            <!-- <th>C</th> -->
            <td>3 555555558555</td>
            <td>9 1111111</td>
        </tr>
    </table>

    <table>

        </tr>

        </tr>

        </tr>

        <tr>
            <td>1</td> <td>2</td> <td>3</td> <td>4</td> <td>5</td>
        </tr>
    </table>



</body>
